<style>
  :root{
    --bg:#020B0A; --bg2:#051F1B; --emerald:#1B5E43; --emerald-bright:#2E8B6B;
    --gold:#E6C547; --gold-bright:#F5D966; --gold-soft:rgba(230,197,71,.15);
    --cream:#F5F3EF; --cream-dim:#C8BFAE; --sage:#9DB0A4;
    --green:#4CAF50; --yellow:#FFD700; --orange:#FF8800; --red:#FF6B5B;
    --card:rgba(5,31,27,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',sans-serif; color:var(--cream); min-height:100vh;
    background:
      radial-gradient(60% 50% at 80% 10%, rgba(46,139,107,.18), transparent 60%),
      radial-gradient(50% 50% at 10% 90%, rgba(27,94,67,.22), transparent 60%),
      linear-gradient(135deg,#020B0A,#051F1B 50%,#020B0A);
    background-attachment:fixed;
    display:flex; align-items:center; justify-content:center; padding:24px 16px;
  }
  .wrap{width:100%; max-width:600px}
  /* progress */
  #bar{position:fixed; top:0; left:0; height:4px; width:0;
    background:linear-gradient(90deg,var(--emerald-bright),var(--gold)); transition:width .4s ease; z-index:10}
  /* mascot */
  .odin{width:140px;height:140px;margin:0 auto 18px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:74px;
    background:radial-gradient(circle at 50% 40%, rgba(230,197,71,.14), transparent 70%);
    filter:drop-shadow(0 0 24px rgba(230,197,71,.18))}
  .odinvid{display:block;margin:0 auto 14px;width:230px;height:230px;border-radius:50%;
    object-fit:cover;object-position:50% 38%;
    -webkit-mask-image:radial-gradient(circle at 50% 50%,#000 56%,transparent 74%);
    mask-image:radial-gradient(circle at 50% 50%,#000 56%,transparent 74%);
    filter:drop-shadow(0 6px 30px rgba(230,197,71,.2))}
  .odin-img{display:block;margin:0 auto 18px;width:180px;height:180px;object-fit:contain;
    border-radius:22px;filter:drop-shadow(0 12px 32px rgba(0,0,0,.5));
    animation:odinIn .5s ease, float 4.5s ease-in-out .5s infinite}
  @keyframes odinIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes float{0%,100%{transform:translateY(0) scale(1) rotate(0)}
    50%{transform:translateY(-12px) scale(1.025) rotate(-.6deg)}}
  @media (prefers-reduced-motion:reduce){.odin-img{animation:none}}
  .bubble{max-width:460px;margin:0 auto 26px;text-align:center;padding:14px 22px;
    border:1px solid var(--gold-soft);border-radius:18px;background:rgba(27,94,67,.18);
    color:var(--cream-dim);font-size:15px;line-height:1.55}
  h1{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:34px;
    text-align:center;line-height:1.15;margin-bottom:10px}
  h1 em{color:var(--gold-bright);font-style:italic}
  .eyebrow{text-align:center;letter-spacing:.22em;text-transform:uppercase;
    font-size:12px;color:var(--sage);margin-bottom:22px;font-weight:500}
  .sub{text-align:center;color:var(--cream-dim);font-size:16px;line-height:1.6;margin-bottom:26px}
  /* options */
  .opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;
    padding:17px 18px;margin-bottom:12px;border:1px solid var(--gold-soft);
    border-radius:14px;background:var(--card);color:var(--cream);font-size:15.5px;
    line-height:1.4;cursor:pointer;transition:.18s;font-family:inherit}
  .opt:hover{border-color:rgba(230,197,71,.5);transform:translateY(-1px)}
  .opt.sel{border-color:var(--gold);box-shadow:0 0 20px rgba(230,197,71,.22);background:rgba(27,94,67,.3)}
  .dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
  .dot.green{background:var(--green)} .dot.yellow{background:var(--yellow)}
  .dot.orange{background:var(--orange)} .dot.red{background:var(--red)}
  /* buttons */
  .btn{display:block;width:100%;padding:17px;margin-top:8px;border:none;border-radius:14px;
    background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:var(--bg);
    font-family:inherit;font-weight:600;font-size:16px;cursor:pointer;transition:.2s;
    box-shadow:0 0 26px rgba(230,197,71,.3)}
  .btn:hover{transform:translateY(-2px);box-shadow:0 0 36px rgba(230,197,71,.45)}
  .btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none}
  .ghost{background:none;border:1px solid var(--gold-soft);color:var(--cream-dim);
    box-shadow:none;font-weight:400;font-size:14px;padding:12px;margin-top:14px}
  .ghost:hover{box-shadow:none;border-color:var(--gold-soft)}
  .back{background:none;border:none;color:var(--sage);font-family:inherit;font-size:14px;
    cursor:pointer;margin-bottom:16px;padding:4px}
  .counter{text-align:center;color:var(--sage);font-size:13px;margin-bottom:18px;letter-spacing:.1em}
  /* inputs */
  input,select,textarea{width:100%;padding:16px 18px;margin-bottom:14px;border-radius:14px;
    border:1px solid var(--gold-soft);background:rgba(5,31,27,.6);color:var(--cream);
    font-family:inherit;font-size:16px;outline:none}
  input:focus,select,textarea:focus{border-color:var(--gold)}
  label{display:block;font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--sage);margin-bottom:8px;margin-top:6px}
  /* result */
  .scorebox{text-align:center;padding:24px;border:1px solid var(--gold-soft);border-radius:18px;
    background:var(--card);margin-bottom:18px}
  .score-num{font-family:'Cormorant Garamond',serif;font-size:56px;color:var(--gold-bright);font-weight:700;line-height:1}
  .badge{display:inline-block;padding:6px 16px;border-radius:30px;font-size:13px;font-weight:600;margin-bottom:14px}
  .metric{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--gold-soft)}
  .metric:last-child{border:none}
  .metric .lbl{font-size:13px;letter-spacing:.08em;color:var(--cream-dim)}
  .metric .val{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold-bright);font-weight:600}
  .insight{padding:18px;border-radius:14px;background:rgba(76,175,80,.1);border:1px solid var(--green);
    margin:18px 0;line-height:1.6;font-size:15px}
  .fade{animation:fade .45s ease}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .hint{text-align:center;color:var(--sage);font-size:12px;margin-top:12px;line-height:1.5}
  a{color:var(--gold-bright)}
</style>
</head>
<body>
<div id="bar"></div>
<div class="wrap" id="app"></div>

<script>
// ====== НАЛАШТУВАННЯ ======
const WEB3FORMS_KEY = '264c3603-62ed-47d2-a5f8-b0f4c0f5c885'; // твій ключ (з quiz-unlocking) — заявки йдуть на пошту

// ====== ДАНІ КВІЗА ======
const TOTAL = 9; // екранів для прогрес-бару
const questions = [
  { key:'q1', title:'ЯСНІСТЬ НАПРЯМКУ', tech:'Дивлюсь, куди ти ведеш…',
    q:'Ти знаєш, куди ведеш свій бізнес. Наскільки чітко зараз видно наступний крок?',
    opts:[
      {t:'Бачу напрямок чітко і вже дію', c:'green', v:3},
      {t:'Маю кілька сильних сценаріїв — обираю найкращий', c:'yellow', v:2},
      {t:'Хочу звіритися з курсом перед наступним ривком', c:'orange', v:1},
      {t:'Відчуваю, що готовий до нового рівня — шукаю, де він', c:'red', v:0},
    ]},
  { key:'q2', title:'ЕНЕРГІЯ І ДРАЙВ', tech:'Слухаю твій ритм…',
    q:'Як ти зараз із енергією та драйвом?',
    opts:[
      {t:'На підйомі — енергії вистачає на все важливе', c:'green', v:3},
      {t:'Загалом добре, інколи хочеться перезарядитись', c:'yellow', v:2},
      {t:'Працюю багато — хочу зробити темп стійкішим', c:'orange', v:1},
      {t:'Готовий до нової якості енергії, не просто «більше встигати»', c:'red', v:0},
    ]},
  { key:'q3', title:'КОМАНДА', tech:'Дивлюсь на твій оркестр…', multi:true,
    q:'Що з цього хочеш підсилити в команді? (обери все, що відгукується)',
    opts:[
      {t:'Делегувати більше, щоб не тримати все на собі', c:'green', v:1},
      {t:'Щоб топи точніше зчитували мою візію', c:'green', v:1},
      {t:'Підняти мотивацію й залученість людей', c:'green', v:1},
      {t:'Зробити структуру стійкішою до змін', c:'green', v:1},
    ]},
  { key:'q4', title:'ЩО ДРАЙВИТЬ', tech:'Шукаю твоє паливо…',
    q:'Що тебе зараз драйвить найбільше?',
    opts:[
      {t:'Вплив і гроші разом — будую щось більше за себе', c:'green', v:3},
      {t:'Передусім вплив, а гроші — підтвердження', c:'yellow', v:2},
      {t:'Гроші, бо вони дають свободу впливати', c:'orange', v:1},
      {t:'Шукаю свій новий сенс — що драйвитиме далі', c:'red', v:0},
    ]},
  { key:'q5', title:'РІШЕННЯ', tech:'Дивлюсь, як ти дієш…',
    q:'Як ти зазвичай приймаєш великі рішення?',
    opts:[
      {t:'Швидко й рішуче, адаптую на ходу', c:'green', v:3},
      {t:'Зважено, але як вирішив — дію впевнено', c:'yellow', v:2},
      {t:'Ретельно аналізую — інколи хочу швидше', c:'orange', v:1},
      {t:'Хочу повернути собі легкість і швидкість у рішеннях', c:'red', v:0},
    ]},
  { key:'q6', title:'ПРОСТІР ДЛЯ РОСТУ', tech:'Остання нота…',
    q:'Наскільки ти зараз дозволяєш собі рости й розширювати вплив?',
    opts:[
      {t:'Дозволяю собі рости й щиро радіти результатам', c:'green', v:3},
      {t:'Тримаю курс, хоч горизонт планування короткий', c:'yellow', v:2},
      {t:'Часом ловлю себе на тому, що сам стримую свій масштаб', c:'orange', v:1},
      {t:'Готовий дозволити собі помітно більше', c:'red', v:0},
    ]},
];

const segments = {
  energy:{ name:'Готовий до нової якості енергії', color:'var(--emerald-bright)',
    text:'Ти багато тягнеш на собі — і робиш це сильно. Наступний рівень не про «встигати ще більше», а про стійку енергію, що не виснажує. Це і є зона твого найшвидшого росту.',
    insight:'Я чую людину, яка багато бере на себе — бо поки так надійніше. І чую, що ти вже готовий до легшого, але не слабшого способу.' },
  map:{ name:'Готовий до ривка', color:'var(--green)',
    text:'Ти точно знаєш, куди йдеш, і маєш для цього силу. Єдине, що пришвидшить тебе зараз — партнер, який бачить твої сліпі зони й тримає темп разом із тобою.',
    insight:'Я чую людину, яка знає свій напрямок. Лишилось одне: щоб поруч був хтось, хто підсвітить те, що зсередини не видно.' },
  analysis:{ name:'Багато сильних можливостей', color:'var(--gold)',
    text:'У тебе на руках кілька сильних сценаріїв — і це розкіш, а не проблема. Питання не «що робити», а куди скерувати свою швидкість. Сфокусуєш — і підеш швидше за всіх.',
    insight:'Я чую, що варіантів багато, а ти звик діяти швидко. Час повернути цю швидкість — тепер сфокусовано на одному.' },
};

// ====== СТАН ======
let step = 0;          // 0 = ім'я; 1..6 = питання; 7 = результат; 8 = форма; 9 = дякую
let answers = {};
let name = '';
const app = document.getElementById('app');
const bar = document.getElementById('bar');
const save = ()=>localStorage.setItem('odin_quiz', JSON.stringify({step,answers,name}));
const load = ()=>{try{const s=JSON.parse(localStorage.getItem('odin_quiz'));if(s){step=s.step;answers=s.answers;name=s.name||''}}catch(e){}};

function setBar(){ bar.style.width = Math.min(100, (step/TOTAL)*100) + '%'; }

// ====== СКОРИНГ ======
function calc(){
  const singles = ['q1','q2','q4','q5','q6'];
  let sum = 0; singles.forEach(k=> sum += (answers[k]?.v ?? 0));
  const score = (sum/15)*10;
  const readiness = Math.round(58 + (sum/15)*42); // 58..100 — завжди підбадьорливо
  const clarity = 60 + Math.round(((answers.q1?.v??0)+(answers.q4?.v??0))/6*40);
  const energy  = 60 + Math.round(((answers.q2?.v??0)+(answers.q5?.v??0))/6*40);
  const team    = 60 + Math.round((answers.q3?.length??0)/4*40);
  // сегмент
  let seg='map';
  if(energy<=40 || score<5) seg='energy';
  else if(clarity<=50) seg='analysis';
  return {score:score.toFixed(1), readiness, clarity, energy, team, seg};
}

// ====== РЕНДЕР ======
function render(){
  setBar(); save(); window.scrollTo(0,0);
  if(step===0) return screenName();
  if(step>=1 && step<=6) return screenQ(step-1);
  if(step===7) return screenResult();
  if(step===8) return screenForm();
  if(step===9) return screenThanks();
}

function odin(face){ return `<video class="odinvid fade" src="odin.mp4" autoplay loop muted playsinline></video>`; }

function screenName(){
  app.innerHTML =
   `<video class="odinvid fade" src="odin.mp4" autoplay loop muted playsinline></video>
    <div class="bubble fade">Привіт, я <b>Одін</b>, шотландський котик. Я тут уже давненько. Мурррррр! Послухаю тебе. Що розкажеш?</div>
    <h1 class="fade">Давай <em>познайомимось</em></h1>
    <label>Як тебе звати?</label>
    <input id="nm" placeholder="Ім'я" value="${name.replace(/"/g,'&quot;')}" autocomplete="given-name">
    <button class="btn" id="go">Далі →</button>`;
  const nm=document.getElementById('nm');
  const go=document.getElementById('go');
  const ok=()=>{ name=nm.value.trim(); go.disabled=name.length<2; };
  nm.oninput=ok; ok(); nm.focus();
  nm.onkeydown=e=>{ if(e.key==='Enter'&&name.length>=2){step=1;render();} };
  go.onclick=()=>{ step=1; render(); };
}

function screenQ(i){
  const Q=questions[i];
  const cur = answers[Q.key];
  const optsHtml = Q.opts.map((o,idx)=>{
    const sel = Q.multi ? (cur||[]).some(x=>x.idx===idx) : cur?.idx===idx;
    return `<button class="opt ${sel?'sel':''}" data-i="${idx}">
      <span class="dot ${o.c}"></span><span>${o.t}</span></button>`;
  }).join('');
  app.innerHTML =
    `<button class="back" id="bk">← Назад</button>
     <video class="odinvid fade" src="odin.mp4" autoplay loop muted playsinline style="width:110px;height:110px;margin-bottom:4px"></video>


     <div class="eyebrow fade">${Q.title}</div>
     <div class="counter">${i+1} / 6 · ${Q.tech}</div>
     <h1 class="fade" style="font-size:26px">${Q.q}</h1>
     <div class="fade" style="margin-top:20px">${optsHtml}</div>
     ${Q.multi?`<button class="btn" id="next">Далі →</button>`:''}`;
  document.getElementById('bk').onclick=()=>{ step--; render(); };
  app.querySelectorAll('.opt').forEach(b=>{
    b.onclick=()=>{
      const idx=+b.dataset.i, o=Q.opts[idx];
      if(Q.multi){
        let arr=answers[Q.key]||[];
        if(arr.some(x=>x.idx===idx)) arr=arr.filter(x=>x.idx!==idx);
        else arr=[...arr,{idx,v:o.v}];
        answers[Q.key]=arr; render();
      } else {
        answers[Q.key]={idx,v:o.v};
        save(); setTimeout(()=>{ step++; render(); },180);
      }
    };
  });
  if(Q.multi){ document.getElementById('next').onclick=()=>{ if(!answers[Q.key])answers[Q.key]=[]; step++; render(); }; }
}

function screenResult(){
  const r=calc(); const S=segments[r.seg];
  let bcolor,blabel;
  if(r.score>=8){bcolor='var(--green)';blabel='Сильна позиція'}
  else if(r.score>=5){bcolor='var(--emerald-bright)';blabel='Міцна база, є куди рости'}
  else if(r.score>=3){bcolor='var(--gold)';blabel='Хороший потенціал до підсилення'}
  else {bcolor='var(--gold-bright)';blabel='Готовий до нового рівня'}
  app.innerHTML =
   `<video class="odinvid fade" src="odin.mp4" autoplay loop muted playsinline></video>
    <div class="eyebrow fade">${S.name}</div>
    <h1 class="fade">Привіт, <em>${name||'друже'}</em>.<br>Я слухав. Ось що я бачу.</h1>
    <div class="scorebox fade" style="margin-top:22px">
      <div class="badge" style="background:${bcolor};color:#04140e">${blabel}</div>
      <div class="score-num">${r.readiness}<span style="font-size:24px;color:var(--cream-dim)">%</span></div>
      <div style="color:var(--sage);font-size:13px;letter-spacing:.1em;margin-top:6px">ІНДЕКС ГОТОВНОСТІ ДО РИВКА</div>
    </div>
    <div class="scorebox fade">
      <div class="metric"><span class="lbl">Ясність напрямку</span><span class="val">${r.clarity}%</span></div>
      <div class="metric"><span class="lbl">Енергія й драйв</span><span class="val">${r.energy}%</span></div>
      <div class="metric"><span class="lbl">Амбіція до росту</span><span class="val">${r.team}%</span></div>
    </div>
    <p class="sub fade" style="text-align:left">${S.text}</p>
    <div class="insight fade">🧭 <b>Що я чую в твоїх словах:</b><br>${S.insight}</div>
    <button class="btn" id="go">Записатись на діагностику ясності →</button>
    <p class="hint">45 хвилин · безкоштовно · один на один</p>`;
  document.getElementById('go').onclick=()=>{ step=8; render(); };
}

function screenForm(){
  app.innerHTML =
   `<button class="back" id="bk">← Назад</button>
    <div class="odin fade" style="width:84px;height:84px;font-size:42px">🐾</div>
    <h1 class="fade">Скажи, де тебе <em>зловити</em></h1>
    <p class="sub fade">Кілька рядків — і я знатиму, як підготуватись до нашої розмови.</p>
    <div class="fade">
      <label>E-mail для звʼязку</label>
      <input id="em" type="email" placeholder="ti@example.com">
      <label>Телефон / Telegram (необовʼязково)</label>
      <input id="ph" placeholder="+380…">
      <label>Коли тобі найзручніше?</label>
      <select id="tm">
        <option>Пн–Ср, 10:00–12:00</option>
        <option>Пн–Ср, 14:00–16:00</option>
        <option>Чт–Пт, 10:00–12:00</option>
        <option>Чт–Пт, 14:00–16:00</option>
        <option>Вихідні, 16:00–18:00</option>
      </select>
      <button class="btn" id="send">Записатись безкоштовно</button>
      <p class="hint">Натискаючи, ти погоджуєшся з <a href="#">політикою конфіденційності</a></p>
    </div>`;
  document.getElementById('bk').onclick=()=>{ step=7; render(); };
  document.getElementById('send').onclick=async()=>{
    const em=document.getElementById('em').value.trim();
    if(!/.+@.+\..+/.test(em)){ document.getElementById('em').style.borderColor='var(--red)'; return; }
    const r=calc();
    const btn=document.getElementById('send'); btn.disabled=true; btn.textContent='Відправляю…';
    const payload={
      access_key: WEB3FORMS_KEY,            // ← встав сюди ключ Web3Forms (як на landing-version2)
      subject:`🧭 Нова заявка на діагностику: ${name}`,
      from_name:'Квіз Одіна',
      'Імʼя':name, 'E-mail':em,
      'Телефон/Telegram':document.getElementById('ph').value,
      'Зручний час':document.getElementById('tm').value,
      'Сегмент':segments[r.seg].name,
      'Скор':`${r.score}/10`,
      'Ясність':r.clarity+'%', 'Енергія':r.energy+'%', 'Команда':r.team+'%',
    };
    try{
      if(WEB3FORMS_KEY && WEB3FORMS_KEY!=='YOUR_WEB3FORMS_ACCESS_KEY'){
        await fetch('https://api.web3forms.com/submit',{method:'POST',
          headers:{'Content-Type':'application/json',Accept:'application/json'},
          body:JSON.stringify(payload)});
      } else { console.log('LEAD (ключ не встановлено) →', payload); }
      if(window.fbq) fbq('track','CompleteRegistration',{content_name:'diagnostika',value:0,currency:'UAH'});
    }catch(e){ console.warn('submit error',e); }
    step=9; render();
  };
}
